name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: gofmt
        run: test -z "$(gofmt -s -l .)"

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Unit tests (requires ffmpeg)
        run: go test ./... -count=1
      - name: Build CLI
        run: go build -o bin/go-ffmpeg ./cmd/go-ffmpeg

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Pull ffmpeg image
        run: docker pull gtstef/ffmpeg:8.1.1
      - name: Extract ffmpeg binaries
        run: |
          id=$(docker create gtstef/ffmpeg:8.1.1)
          mkdir -p /tmp/ffmpeg-bin
          docker cp "$id:/ffmpeg" /tmp/ffmpeg-bin/ffmpeg
          docker cp "$id:/ffprobe" /tmp/ffmpeg-bin/ffprobe
          chmod +x /tmp/ffmpeg-bin/ffmpeg /tmp/ffmpeg-bin/ffprobe
          docker rm "$id"
      - name: Integration tests
        env:
          GOFFMPEG_FFMPEG_PATH: /tmp/ffmpeg-bin/ffmpeg
          GOFFMPEG_FFPROBE_PATH: /tmp/ffmpeg-bin/ffprobe
          GOFFMPEG_SKIP_HW: "1"
        run: go test -tags=integration ./... -run Integration -v
      - name: CLI compatibility report
        env:
          GOFFMPEG_FFMPEG_PATH: /tmp/ffmpeg-bin/ffmpeg
          GOFFMPEG_FFPROBE_PATH: /tmp/ffmpeg-bin/ffprobe
          GOFFMPEG_SKIP_HW: "1"
        run: |
          go build -o bin/go-ffmpeg ./cmd/go-ffmpeg
          ./bin/go-ffmpeg -json | head -20
          ./bin/go-ffmpeg -skip-hw-tests | head -15
